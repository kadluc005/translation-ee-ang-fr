server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: always fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the FastAPI backend (same-origin, no CORS needed).
    # The /api prefix is stripped so /api/translation/ -> /translation/ on the backend.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Audio synthesis / model inference can take a while.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 25m;
    }
}
